<svg xmlns="http://www.w3.org/2000/svg" width="91mm" height="61mm" viewBox="0 0 910 610" role="img" aria-labelledby="title desc">
  <title id="title">Prime Electric business card front</title>
  <desc id="desc">Față carte de vizită Prime Electric, format tipar 91x61mm cu bleed 3mm.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="60%" stop-color="#121217"/>
      <stop offset="100%" stop-color="#1b1b22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5ddab"/>
      <stop offset="100%" stop-color="#c8963a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(772 132) rotate(121.65) scale(362 432)">
      <stop offset="0%" stop-color="#f2d38a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f2d38a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="910" height="610" fill="url(#bg)"/>
  <rect width="910" height="610" fill="url(#grid)"/>
  <rect width="910" height="610" fill="url(#glow)"/>

  <g transform="translate(86 96)">
    <text x="0" y="0" fill="#fffbf5" font-family="Cormorant Garamond, Georgia, serif" font-size="70" font-style="italic">Prime</text>
    <text x="184" y="4" fill="#ececef" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="10">ELECTRIC</text>
    <text x="2" y="46" fill="#b8b8bf" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2">INSTALAȚII ELECTRICE • SMART HOME • TABLOURI</text>
  </g>

  <g transform="translate(86 242)" font-family="Montserrat, Arial, sans-serif">
    <text x="0" y="0" fill="#a1a1aa" font-size="16" letter-spacing="3">CONTACT DIRECT</text>
    <text x="0" y="58" fill="#fffbf5" font-size="40" font-weight="600" letter-spacing="1">0758 669 402</text>
    <text x="0" y="110" fill="#fffbf5" font-size="40" font-weight="600" letter-spacing="1">0756 269 143</text>
  </g>

  <g transform="translate(86 486)" fill="#cfcfd4" font-family="Montserrat, Arial, sans-serif">
    <text x="0" y="0" font-size="16" letter-spacing="2.2">office@prime-electric.ro</text>
    <text x="0" y="30" font-size="16" letter-spacing="2.2">www.prime-electric.ro • Iași, România</text>
  </g>

  <g transform="translate(622 338)">
    <rect x="0" y="0" width="206" height="202" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(242,211,138,0.45)" stroke-width="1.5"/>
    <g transform="translate(41 42)">
      <rect x="0" y="0" width="124" height="124" rx="22" fill="none" stroke="url(#gold)" stroke-width="4"/>
      <path d="M70 20 42 72h22l-12 29 43-50H73l9-31Z" fill="url(#gold)"/>
    </g>
    <text x="103" y="178" text-anchor="middle" fill="#f5ddab" font-family="Montserrat, Arial, sans-serif" font-size="18" letter-spacing="2.8">ANRE</text>
  </g>

  <!-- Trim area: 85x55mm centered (3mm bleed each side) -->
  <rect x="30" y="30" width="850" height="550" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1.4" stroke-dasharray="8 8"/>
  <!-- Safe area: 79x49mm -->
  <rect x="60" y="60" width="790" height="490" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="6 10"/>
</svg>
